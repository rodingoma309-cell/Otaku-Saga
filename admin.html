<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Otaku Saga</title>
  <link rel="icon" type="image/png" href="otaku.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh; 
      padding: 20px; 
    }
    .admin-container { 
      max-width: 1400px; 
      margin: 0 auto; 
      background: rgba(255,255,255,0.95); 
      border-radius: 20px; 
      padding: 30px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    h1 { 
      text-align: center; 
      color: #6c5ce7; 
      margin-bottom: 10px; 
      font-size: 2.5em; 
    }
    .stats-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
      gap: 20px; 
      margin: 30px 0; 
    }
    .stat-card { 
      background: linear-gradient(135deg, #6C5CE7, #A29BFE); 
      color: white; 
      padding: 25px; 
      border-radius: 15px; 
      text-align: center; 
      box-shadow: 0 10px 30px rgba(108, 92, 231, 0.3);
    }
    .stat-card h3 { margin-bottom: 10px; font-size: 1.1em; }
    .stat-card div { font-size: 2.5em; font-weight: bold; }
    
    #searchUser { 
      width: 100%; 
      max-width: 400px; 
      padding: 15px; 
      border: 2px solid #6C5CE7; 
      border-radius: 12px; 
      font-size: 16px; 
      margin-bottom: 25px; 
    }
    
    table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 20px; 
      background: white; 
      border-radius: 12px; 
      overflow: hidden; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    th, td { 
      padding: 15px; 
      text-align: left; 
      border-bottom: 1px solid #eee; 
    }
    th { 
      background: linear-gradient(135deg, #6C5CE7, #A29BFE); 
      color: white; 
      font-weight: 600; 
    }
    .btn-small { 
      padding: 8px 15px; 
      margin: 2px; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 13px; 
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-success { background: #27ae60; color: white; }
    .btn-warning { background: #f39c12; color: white; }
    .btn-small:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    
    #adminLogout { 
      background: linear-gradient(135deg, #e74c3c, #c0392b); 
      color: white; 
      padding: 18px 40px; 
      border: none; 
      border-radius: 12px; 
      margin-top: 30px; 
      cursor: pointer; 
      font-size: 16px; 
      font-weight: 600;
      width: 100%;
      transition: all 0.3s;
    }
    #adminLogout:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(231, 76, 60, 0.4); }
  </style>
</head>
<body>
  <div class="admin-container">
    <h1>🎌 Admin Dashboard - Otaku Saga</h1>
    <p style="text-align: center; color: #666; margin-bottom: 30px;">Gestion complète des utilisateurs</p>
    
    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Inscrits</h3>
        <div id="totalUsers">0</div>
      </div>
      <div class="stat-card">
        <h3>Utilisateurs Actifs</h3>
        <div id="activeUsers">0</div>
      </div>
      <div class="stat-card">
        <h3>Bannis</h3>
        <div id="bannedUsers">0</div>
      </div>
    </div>

    <input type="text" id="searchUser" placeholder="🔍 Rechercher un utilisateur par email...">

    <table id="usersTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Email</th>
          <th>Rôle</th>
          <th>Date Inscription</th>
          <th>Statut</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <button id="adminLogout">🚪 Déconnexion Admin</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
