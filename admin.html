<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Otaku Saga</title>
  <link rel="icon" type="image/png" href="otaku.png">
  <!-- 🔥 FIREBASE CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #0f0f23 0%, #2a1b3d 50%, #1a0f2e 100%); 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #ffffff;
      min-height: 100vh; 
      padding: 20px; 
    }
    .admin-container { 
      max-width: 1400px; 
      margin: 0 auto; 
      background: rgba(255,255,255,0.03); 
      backdrop-filter: blur(20px);
      border-radius: 25px; 
      border: 1px solid rgba(108, 92, 231, 0.3);
      padding: 40px; 
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .header {
      text-align: center; 
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 2px solid rgba(108, 92, 231, 0.3);
    }
    h1 { 
      background: linear-gradient(135deg, #6c5ce7, #a29bfe, #fd79a8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 3em; 
      margin-bottom: 10px;
      font-weight: 800;
    }
    .admin-email {
      background: rgba(108, 92, 231, 0.2);
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 14px;
      color: #a29bfe;
      border: 1px solid rgba(108, 92, 231, 0.4);
    }
    
    .stats-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
      gap: 25px; 
      margin: 40px 0; 
    }
    .stat-card { 
      background: linear-gradient(145deg, rgba(108, 92, 231, 0.2), rgba(162, 155, 254, 0.1)); 
      border: 1px solid rgba(108, 92, 231, 0.3);
      color: white; 
      padding: 30px; 
      border-radius: 20px; 
      text-align: center; 
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s;
    }
    .stat-card:hover::before {
      transform: translateX(100%);
    }
    .stat-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(108, 92, 231, 0.4);
    }
    .stat-icon {
      font-size: 3em;
      margin-bottom: 15px;
      opacity: 0.9;
    }
    .stat-card h3 { 
      margin-bottom: 15px; 
      font-size: 1.2em; 
      opacity: 0.9;
    }
    .stat-number { 
      font-size: 3em; 
      font-weight: 800; 
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    #searchUser { 
      width: 100%; 
      max-width: 500px; 
      margin: 0 auto 30px;
      display: block;
      padding: 18px 25px; 
      background: rgba(255, 255, 255, 0.1); 
      border: 2px solid rgba(108, 92, 231, 0.4); 
      border-radius: 15px; 
      color: white;
      font-size: 16px; 
      backdrop-filter: blur(10px);
    }
    #searchUser::placeholder {
      color: rgba(255,255,255,0.6);
    }
    #searchUser:focus {
      outline: none;
      border-color: #6c5ce7;
      box-shadow: 0 0 20px rgba(108, 92, 231, 0.3);
    }
    
    .users-section {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 20px;
      padding: 30px;
      border: 1px solid rgba(108, 92, 231, 0.2);
      margin-top: 30px;
    }
    
    table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 20px; 
      background: rgba(255, 255, 255, 0.02); 
      border-radius: 15px; 
      overflow: hidden; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    th, td { 
      padding: 18px 15px; 
      text-align: left; 
      border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
    }
    th { 
      background: linear-gradient(135deg, #6c5ce7, #a29bfe); 
      color: white; 
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    tr:hover {
      background: rgba(108, 92, 231, 0.1);
    }
    .status-banned { color: #ff6b6b !important; }
    .status-active { color: #51cf66 !important; }
    
    .btn-small { 
      padding: 10px 18px; 
      margin: 3px; 
      border: none; 
      border-radius: 10px; 
      cursor: pointer; 
      font-size: 13px; 
      font-weight: 700;
      transition: all 0.3s ease;
      min-width: 80px;
    }
    .btn-danger { 
      background: linear-gradient(135deg, #ff6b6b, #ee5a52); 
      color: white; 
    }
    .btn-success { 
      background: linear-gradient(135deg, #51cf66, #40c057); 
      color: white; 
    }
    .btn-warning { 
      background: linear-gradient(135deg, #ffd43b, #fab005); 
      color: #333; 
    }
    .btn-small:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
    }
    
    #adminLogout { 
      background: linear-gradient(135deg, #ff6b6b, #ee5a52); 
      color: white; 
      padding: 20px 50px; 
      border: none; 
      border-radius: 15px; 
      margin-top: 40px; 
      cursor: pointer; 
      font-size: 18px; 
      font-weight: 700;
      width: 100%;
      transition: all 0.3s ease;
    }
    #adminLogout:hover { 
      transform: translateY(-5px); 
      box-shadow: 0 15px 35px rgba(255, 107, 107, 0.4); 
    }
    
    @media (max-width: 768px) {
      .admin-container { padding: 20px; margin: 10px; }
      h1 { font-size: 2em; }
      .stats-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
      table { font-size: 14px; }
      .btn-small { padding: 8px 12px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="header">
      <h1>🎌 Admin Dashboard</h1>
      <div class="admin-email" id="adminEmailDisplay"></div>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <h3>Total Inscrits</h3>
        <div class="stat-number" id="totalUsers">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🟢</div>
        <h3>Utilisateurs Actifs</h3>
        <div class="stat-number" id="activeUsers">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🚫</div>
        <h3>Utilisateurs Bannis</h3>
        <div class="stat-number" id="bannedUsers">0</div>
      </div>
    </div>

    <input type="text" id="searchUser" placeholder="🔍 Rechercher un utilisateur par email...">

    <div class="users-section">
      <h3 style="margin-bottom: 20px; color: #6c5ce7; font-size: 1.5em;">📋 Gestion des Utilisateurs</h3>
      <table id="usersTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Rôle</th>
            <th>Date Inscription</th>
            <th>Statut</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <button id="adminLogout">🚪 Déconnexion Admin</button>
  </div>

  <script src="app.js"></script>
  <script>
    // Afficher email admin connecté
    document.addEventListener('DOMContentLoaded', function() {
      const adminEmail = localStorage.getItem('adminEmail');
      if (adminEmail) {
        document.getElementById('adminEmailDisplay').textContent = `Connecté: ${adminEmail}`;
      }
    });
  </script>
</body>
</html>
