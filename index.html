<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
	 <link rel="icon" type="image/png" href="otaku.png">
    <link rel="apple-touch-icon" href="otaku.png">
	 <meta property="og:image" content="otaku.png">
    <title>Otaku Saga - Connexion</title>
    <link rel="stylesheet" href="auth.css" />
	<!-- 🔥 FIREBASE CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  </head>

  <body>
    <div class="auth-container">
      <div class="auth-box">
        <div class="logo-section">
          <h1 class="app-title">🎌 Otaku Saga</h1>
          <p class="app-subtitle">Votre portail vers l'univers des mangas</p>
        </div>

        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              autocomplete="email"
              placeholder="votre@email.com"
            />
          </div>

          <div class="form-group">
            <label for="password">Mot de passe</label>
            <input
              type="password"
              id="password"
              name="password"
              required
              autocomplete="current-password"
              placeholder="••••••••"
            />
          </div>

          <button type="submit" class="btn-auth">Se connecter</button>

          <div id="errorMessage" class="error-message"></div>
        </form>

        <div class="auth-footer">
          <p>
            Pas encore de compte ? <a href="inscription.html" id="registerLink">S'inscrire</a>
          </p>
          
          <!-- PORTAIL ADMINISTRATEUR SECRET -->
          <div style="margin-top: 25px; padding: 20px; background: rgba(108, 92, 231, 0.05); border-radius: 12px; border: 1px solid rgba(108, 92, 231, 0.2);">
            <p style="text-align: center; color: #6c5ce7; font-weight: 700; font-size: 16px; margin-bottom: 12px;">
              🔐 Portail Administrateur
            </p>
            <p style="text-align: center; color: #666; font-size: 13px; margin-bottom: 15px;">
              Accès réservé - Utilisez vos identifiants admin
            </p>
            <button 
              id="adminLoginBtn" 
              type="button"
              class="btn-auth" 
              style="background: linear-gradient(135deg, #6c5ce7, #a29bfe); width: 100%; font-weight: 600;"
            >
              👑 Accéder au Panneau Admin
            </button>
          </div>
          
          <div
            id="alreadyConnected"
            style="
              display: none;
              margin-top: 20px;
              padding: 15px;
              background: rgba(108, 92, 231, 0.1);
              border-radius: 10px;
              text-align: center;
            "
          >
            <p style="color: #a29bfe; margin-bottom: 10px">
              Vous êtes déjà connecté
            </p>
            <a
              href="accueil.html"
              style="color: #6c5ce7; text-decoration: none; font-weight: 600"
              >Aller à l'accueil →</a
            >
          </div>
        </div>
      </div>
    </div>

    <script>
// 🔥 DEBUG + FIX URGENT index.html
document.addEventListener('DOMContentLoaded', async function() {
  console.log('🚀 index.html chargé - DEBUG ACTIF');
  
  // VÉRIFIER localStorage après inscription
  const isAuth = localStorage.getItem('isAuthenticated');
  const email = localStorage.getItem('email');
  console.log('🔐 DEBUG localStorage:', { isAuth, email });
  
  // FORCER alreadyConnected
  const alreadyConnectedDiv = document.getElementById('alreadyConnected');
  if (isAuth === 'true' && alreadyConnectedDiv) {
    console.log('✅ USER CONNECTÉ - Affichage alreadyConnected');
    alreadyConnectedDiv.style.display = 'block';
  }
  
  // 🔥 FIX loginForm
  const loginForm = document.getElementById('loginForm');
  loginForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    console.log('🔐 LOGIN FORM SUBMIT');
    
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorMessage = document.getElementById('errorMessage');
    
    if (!email || !password) {
      errorMessage.textContent = 'Champs vides';
      return;
    }
    
    // ADMIN SECRET
    const ADMIN_EMAILS = ['admin@otaku.com', 'admin@saga.com'];
    const ADMIN_PASSWORD = 'OtakuSaga2026!';
    
    if (ADMIN_EMAILS.includes(email) && password === ADMIN_PASSWORD) {
      localStorage.setItem('isAdmin', 'true');
      localStorage.setItem('adminEmail', email);
      window.location.href = 'admin.html';
      return;
    }
    
    // USER (simulation sans Firebase)
    if (email.includes('@') && password.length >= 6) {
      localStorage.setItem('isAuthenticated', 'true');
      localStorage.setItem('email', email);
      window.location.href = 'accueil.html';
    } else {
      errorMessage.textContent = '❌ Identifiants incorrects';
    }
  });
  
  // 🔥 FIX adminLoginBtn
  const adminLoginBtn = document.getElementById('adminLoginBtn');
  adminLoginBtn.addEventListener('click', function() {
    console.log('👑 ADMIN BUTTON CLIC');
    document.getElementById('email').value = 'admin@otaku.com';
    document.getElementById('password').value = 'OtakuSaga2026!';
    loginForm.dispatchEvent(new Event('submit'));
  });
  
  // 🔥 FIX registerLink
  const registerLink = document.getElementById('registerLink');
  registerLink.addEventListener('click', function(e) {
    e.preventDefault();
    window.location.href = 'inscription.html';
  });
  
  console.log('✅ TOUS events attachés !');
});
</script>
	
  </body>
</html>
