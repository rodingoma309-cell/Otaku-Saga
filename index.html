<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="nour.jpg" />
    <link rel="apple-touch-icon" href="nour.jpg" />
    <meta property="og:image" content="nour.jpg" />
    <title>Otaku Saga - Connexion</title>
    <link rel="stylesheet" href="auth.css" />
  </head>

  <body>
    <div class="auth-container">
      <div class="auth-box">
        <div class="logo-section">
          <h1 class="app-title">🎌 Otaku Saga</h1>
          <p class="app-subtitle">Votre portail vers l'univers des mangas</p>
        </div>

        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              autocomplete="email"
              placeholder="votre@email.com"
            />
          </div>

          <div class="form-group">
            <label for="password">Mot de passe</label>
            <input
              type="password"
              id="password"
              name="password"
              required
              autocomplete="current-password"
              placeholder="••••••••"
            />
          </div>

          <button type="submit" class="btn-auth">Se connecter</button>

          <div id="errorMessage" class="error-message"></div>
        </form>

        <div class="auth-footer">
          <p>
            Pas encore de compte ? <a href="#" id="registerLink">S'inscrire</a>
          </p>
          <div
            id="alreadyConnected"
            style="
              display: none;
              margin-top: 20px;
              padding: 15px;
              background: rgba(108, 92, 231, 0.1);
              border-radius: 10px;
              text-align: center;
            "
          >
            <p style="color: #a29bfe; margin-bottom: 10px">
              Vous êtes déjà connecté
            </p>
            <a
              href="accueil.html"
              style="color: #6c5ce7; text-decoration: none; font-weight: 600"
              >Aller à l'accueil →</a
            >
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
