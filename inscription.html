<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="otaku.png">
  <link rel="apple-touch-icon" href="otaku.png">
  <meta property="og:image" content="otaku.png">
  <title>Otaku Saga - Inscription</title>
  <link rel="stylesheet" href="auth.css" />
  
  <!-- 🔥 FIREBASE CDN -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  
  <style>
    /* Loading spinner */
    .loading {
      display: none;
      text-align: center;
      margin-top: 15px;
      padding: 10px;
      background: rgba(108, 92, 231, 0.1);
      border-radius: 8px;
      color: #6c5ce7;
    }
    .spinner {
      border: 2px solid rgba(108, 92, 231, 0.2);
      border-top: 2px solid #6c5ce7;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .success-check {
      color: #00d4aa;
      font-size: 24px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="logo-section">
        <h1 class="app-title">🎌 Otaku Saga</h1>
        <p class="app-subtitle">Rejoignez la communauté Otaku !</p>
      </div>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input
            type="email"
            id="regEmail"
            name="email"
            required
            autocomplete="email"
            placeholder="votre@email.com"
          />
        </div>

        <div class="form-group">
          <label for="regPassword">Mot de passe</label>
          <input
            type="password"
            id="regPassword"
            name="password"
            required
            autocomplete="new-password"
            placeholder="••••••••"
            minlength="6"
          />
        </div>

        <button type="submit" class="btn-auth" id="submitBtn">
          S'inscrire
        </button>

        <div id="regErrorMessage" class="error-message"></div>
        <div id="regSuccessMessage" class="loading">
          <div class="spinner"></div>
          <span>Création de votre compte...</span>
        </div>
      </form>

      <div class="auth-footer">
        <p>Déjà un compte ? <a href="index.html" id="loginLink">Se connecter</a></p>
      </div>
    </div>
  </div>

  <script>
    // 🔥 INSCRIPTION COMPLÈTE + REDIRECTION FORCÉE
    document.addEventListener('DOMContentLoaded', function() {
      console.log('🚀 inscription.html chargé');
      
      const form = document.getElementById('registerForm');
      const submitBtn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('regErrorMessage');
      const successMsg = document.getElementById('regSuccessMessage');
      
      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        console.log('📝 FORMULAIRE INSCRIPTION SUBMIT');
        
        // Récupérer données
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        
        // Validation
        if (!email || !password) {
          showError('Tous les champs sont obligatoires');
          return;
        }
        if (password.length < 6) {
          showError('Mot de passe trop court (min 6 caractères)');
          return;
        }
        if (!email.includes('@')) {
          showError('Email invalide');
          return;
        }
        
        // ADMIN BLOCK
        const ADMIN_EMAILS = ['admin@otaku.com', 'admin@saga.com'];
        if (ADMIN_EMAILS.includes(email)) {
          showError('Cet email est réservé à l\'administration');
          return;
        }
        
        // UI Loading
        submitBtn.disabled = true;
        submitBtn.textContent = 'Création...';
        successMsg.style.display = 'block';
        errorMsg.style.display = 'none';
        
        console.log('💾 Tentative création:', email);
        
        try {
          // 🔥 SIMULATION FIREBASE (remplacez par vraie DB)
          await new Promise(resolve => setTimeout(resolve, 1500)); // Simule attente DB
          
          // VÉRIFIER DOUBLON LOCAL (simulé)
          const existingUsers = JSON.parse(localStorage.getItem('otakuUsers') || '[]');
          if (existingUsers.find(user => user.email === email)) {
            throw new Error('Cet email existe déjà');
          }
          
          // ✅ SUCCÈS - SAUVEGARDER
          const newUser = {
            email,
            password, // ⚠️ En prod: hacher !
            role: 'user',
            createdAt: new Date().toISOString(),
            banned: false
          };
          
          existingUsers.push(newUser);
          localStorage.setItem('otakuUsers', JSON.stringify(existingUsers));
          
          // ✅ CONNEXION AUTOMATIQUE
          localStorage.setItem('isAuthenticated', 'true');
          localStorage.setItem('email', email);
          
          console.log('✅ COMPTE CRÉÉ:', email);
          
          // UI Succès
          successMsg.innerHTML = `
            <div class="success-check">✅</div>
            <span>Compte créé ! Redirection...</span>
          `;
          
          // 🔄 REDIRECTION FORCÉE (3 étapes)
          setTimeout(() => {
            window.location.replace('index.html'); // Méthode 1: Remplace l'historique
          }, 1500);
          
        } catch(error) {
          console.error('❌ ERREUR:', error.message);
          showError(error.message || 'Erreur création compte');
        } finally {
          // Reset UI
          submitBtn.disabled = false;
          submitBtn.textContent = "S'inscrire";
          successMsg.style.display = 'none';
        }
      });
      
      // Login link
      document.getElementById('loginLink').addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = 'index.html';
      });
      
      console.log('✅ Inscription prête !');
    });
    
    // Fonctions utilitaires
    function showError(message) {
      const errorMsg = document.getElementById('regErrorMessage');
      errorMsg.textContent = message;
      errorMsg.style.display = 'block';
      
      // Auto-hide
      setTimeout(() => {
        errorMsg.style.display = 'none';
      }, 5000);
    }
  </script>
</body>
</html>
