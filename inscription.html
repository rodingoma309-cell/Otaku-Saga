<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="otaku.png" />
    <link rel="apple-touch-icon" href="otaku.png" />
    <meta property="og:image" content="otaku.png" />
    <title>Otaku Saga - Inscription</title>
    <link rel="stylesheet" href="auth.css" />
    
    <!-- 🔥 FIREBASE CDN (OBLIGATOIRE pour app.js) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-box">
        <div class="logo-section">
          <h1 class="app-title">🎌 Otaku Saga</h1>
          <p class="app-subtitle">Créez votre compte</p>
        </div>

        <form id="registerForm" class="auth-form">
          <div class="form-group">
            <label for="regEmail">Email</label>
            <input
              type="email"
              id="regEmail"
              name="email"
              required
              autocomplete="email"
              placeholder="votre@email.com"
            />
          </div>

          <div class="form-group">
            <label for="regPassword">Mot de passe</label>
            <input
              type="password"
              id="regPassword"
              name="password"
              required
              autocomplete="new-password"
              placeholder="••••••••"
              minlength="6"
            />
          </div>

          <button type="submit" class="btn-auth">S'inscrire</button>

          <div id="regErrorMessage" class="error-message"></div>
          <div
            id="regSuccessMessage"
            class="success-message"
            style="display: none"
          ></div>
        </form>

        <div class="auth-footer">
          <p>Déjà un compte ? <a href="index.html" id="loginLink">Se connecter</a></p>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
